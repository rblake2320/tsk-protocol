name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  protocol:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.4.5-alpine@sha256:bb186d083732f669da90be8b0f975a37812b15e913465bb14d845db72a4e3e08
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:ha
      - run: npm run test:redis
        env:
          TSK_REDIS_URL: redis://127.0.0.1:6379
      - run: npm run test:pack
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: rblake2320/bpc-protocol
          ref: ad6516698f3bb85a3517577f647cf46901205fd1
          path: .compat/bpc-protocol
      - run: npm ci --prefix .compat/bpc-protocol
      - run: npm run build --prefix .compat/bpc-protocol
      - run: npm run test:bpc-compat
        env:
          BPC_PROTOCOL_PATH: ${{ github.workspace }}/.compat/bpc-protocol
      - run: npm audit
