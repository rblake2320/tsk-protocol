name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  protocol:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.4.5-alpine@sha256:bb186d083732f669da90be8b0f975a37812b15e913465bb14d845db72a4e3e08
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      postgres:
        image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_DB: tsk_test
          POSTGRES_USER: tsk_test
          POSTGRES_PASSWORD: tsk-test-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tsk_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      # node B: a GENUINELY INDEPENDENT PostgreSQL 16 (separate service, no shared
      # state) for the two-node #10 drill.
      postgres_b:
        image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_DB: tsk_test
          POSTGRES_USER: tsk_test
          POSTGRES_PASSWORD: tsk-test-only-password
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U tsk_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      # HA outbox contract vitest (declared local dependency, not an npx fetch).
      - run: npm run typecheck:contract -w packages/server
      - run: npm run test:ha-contract -w packages/server
      # TSK durable HOTP-outbox (#10): hermetic logic + real-PG adversarial evidence.
      - run: npm run test:hotp-outbox -w packages/server
      # production NodePostgresTransactor (#10): hermetic driver-fake unit suite.
      - run: npm run test:pg-transactor -w packages/server
      # two-node authenticated transport (#10 PR1): hermetic loopback unit suite.
      - run: npm run test:http-outbox -w packages/server
      - run: npm run test:ha
      - run: npm run test:redis
        env:
          TSK_REDIS_URL: redis://127.0.0.1:6379
      # real-PG adversarial evidence; the .mts THROWS if TSK_TEST_POSTGRES_URL is
      # unset, so this step FAILS rather than silently skipping. Now runs THROUGH the
      # shipped NodePostgresTransactor.
      - run: npm run test:postgres:ha
        env:
          TSK_TEST_POSTGRES_URL: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5432/tsk_test
      # deterministic real-network partition drill for the production transactor
      # (wire-protocol-keyed faults; work / COMMIT-window / acquire).
      - run: npm run test:pg-partition
        env:
          TSK_TEST_POSTGRES_URL: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5432/tsk_test
      # two-node A->B drill (#10 PR1): two INDEPENDENT PG16 (5432 + 5433), authenticated
      # decision-bound transport, happy / lost-ACK partition / PG-B-down, measured RPO/RTO.
      # THROWS if either URL is unset (no silent skip). Does NOT close #10.
      - run: npm run test:two-node
        env:
          TSK_TEST_POSTGRES_URL_A: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5432/tsk_test
          TSK_TEST_POSTGRES_URL_B: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5433/tsk_test
      - run: npm run test:pack
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: rblake2320/bpc-protocol
          ref: ad6516698f3bb85a3517577f647cf46901205fd1
          path: .compat/bpc-protocol
      - run: npm ci --prefix .compat/bpc-protocol
      - run: npm run build --prefix .compat/bpc-protocol
      - run: npm run test:bpc-compat
        env:
          BPC_PROTOCOL_PATH: ${{ github.workspace }}/.compat/bpc-protocol
      - run: npm audit
