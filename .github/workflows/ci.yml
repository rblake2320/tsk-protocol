name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  protocol:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.4.5-alpine@sha256:bb186d083732f669da90be8b0f975a37812b15e913465bb14d845db72a4e3e08
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      postgres:
        image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_DB: tsk_test
          POSTGRES_USER: tsk_test
          POSTGRES_PASSWORD: tsk-test-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tsk_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      # node B: a GENUINELY INDEPENDENT PostgreSQL 16 (separate service, no shared
      # state) for the two-node #10 drill.
      postgres_b:
        image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_DB: tsk_test
          POSTGRES_USER: tsk_test
          POSTGRES_PASSWORD: tsk-test-only-password
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U tsk_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      # control DB: a THIRD independent PostgreSQL 16 INSTANCE / state authority (separate
      # service, no shared state with A/B or Redis) for the PR2a HA fencing-foundation drill.
      # NOTE: on a single CI runner these are independent instances, NOT independent physical
      # failure domains — real fault-domain separation is a deployment/topology responsibility.
      postgres_control:
        image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_DB: tsk_test
          POSTGRES_USER: tsk_test
          POSTGRES_PASSWORD: tsk-test-only-password
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U tsk_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      # HA outbox contract vitest (declared local dependency, not an npx fetch).
      - run: npm run typecheck:contract -w packages/server
      - run: npm run test:ha-contract -w packages/server
      # TSK durable HOTP-outbox (#10): hermetic logic + real-PG adversarial evidence.
      - run: npm run test:hotp-outbox -w packages/server
      # production NodePostgresTransactor (#10): hermetic driver-fake unit suite.
      - run: npm run test:pg-transactor -w packages/server
      # two-node authenticated transport (#10 PR1): hermetic loopback unit suite.
      - run: npm run test:http-outbox -w packages/server
      - run: npm run test:ha
      - run: npm run test:redis
        env:
          TSK_REDIS_URL: redis://127.0.0.1:6379
      # real-PG adversarial evidence; the .mts THROWS if TSK_TEST_POSTGRES_URL is
      # unset, so this step FAILS rather than silently skipping. Now runs THROUGH the
      # shipped NodePostgresTransactor.
      - run: npm run test:postgres:ha
        env:
          TSK_TEST_POSTGRES_URL: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5432/tsk_test
      # deterministic real-network partition drill for the production transactor
      # (wire-protocol-keyed faults; work / COMMIT-window / acquire).
      - run: npm run test:pg-partition
        env:
          TSK_TEST_POSTGRES_URL: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5432/tsk_test
      # two-node A->B drill (#10 PR1): two INDEPENDENT PG16 (5432 + 5433), authenticated
      # decision-bound transport, happy / lost-ACK partition / PG-B-down, measured RPO/RTO.
      # THROWS if either URL is unset (no silent skip). Does NOT close #10.
      - run: npm run test:two-node
        env:
          TSK_TEST_POSTGRES_URL_A: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5432/tsk_test
          TSK_TEST_POSTGRES_URL_B: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5433/tsk_test
      # PR2a HA fencing FOUNDATION drill (#10): pinned full-catalog schema attestation
      # (+ live per-tx re-attestation), signed per-step provisioning saga, signed epoch
      # witness, monotonic command-bound lease, replay-over-head / tamper / rotation
      # defenses, control-clock fence-advance with a signed evidence payload + freeze-
      # under-PREPARING + idempotent retry, and a BARRIER-controlled concurrent-intent
      # race. Runs against the THIRD independent control PG16 instance (5434) + the REAL
      # Redis service (production RedisFencingStore). THROWS if either URL is unset (no
      # silent skip). Bounded/mechanism-only (single Redis, not a fault-tolerant topology);
      # does NOT close #10.
      - run: npm run test:ha-fencing
        env:
          TSK_TEST_CONTROL_PG_URL: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5434/tsk_test
          TSK_TEST_REDIS_URL: redis://127.0.0.1:6379
      # PR2b-0 source in-tx fence/lease gate (#10): the gate primitive + external witness (single
      # source PG); the non-bypassable append wiring + transactor pre-commit re-check + frozen
      # receipt through a real PgTskDurableOutbox; and the deterministic crash-point drills across
      # INDEPENDENT source A (5432) + control (5434) PG16 + real Redis. THROW if env is unset (no
      # silent skip). Bounded/mechanism-only; does NOT close #10.
      - run: npm run test:source-fence
        env:
          TSK_TEST_SOURCE_PG_URL: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5432/tsk_test
      - run: npm run test:source-fence-outbox
        env:
          TSK_TEST_SOURCE_PG_URL: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5432/tsk_test
      - run: npm run test:source-fence-crash
        env:
          TSK_TEST_SOURCE_PG_URL_A: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5432/tsk_test
          TSK_TEST_CONTROL_PG_URL: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5434/tsk_test
          TSK_TEST_REDIS_URL: redis://127.0.0.1:6379
      # (H3) REAL concurrency (barrier append-vs-revoke, pg_locks-proven) + REAL physical
      # snapshot/restore/divergent-write fork caught by the witness. Independent source A (5432) +
      # control (5434) PG16. Also exercises the C2/H1 compiled attestation + mandatory bound gate.
      - run: npm run test:source-fence-h3
        env:
          TSK_TEST_SOURCE_PG_URL_A: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5432/tsk_test
          TSK_TEST_CONTROL_PG_URL: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5434/tsk_test
      # (PR2b-1) complete canonical 1..N export + ONE replay authority + dual independent signatures.
      - run: npm run test:source-export
        env:
          TSK_TEST_SOURCE_PG_URL: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5432/tsk_test
      # (PR2b-2) receiver B — isolated staging + strict replay/verify + atomic finalize (independent B @5434).
      - run: npm run test:receiver
        env:
          TSK_TEST_SOURCE_PG_URL_A: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5432/tsk_test
          TSK_TEST_RECEIVER_PG_URL_B: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5434/tsk_test
      # (PR2b-3) control cutover ordering — signed SOURCE_FENCED->FENCED->IMPORTING->READY binding the
      # frozen receipt + BFinalizedReceipt, with the proven B!=source AND B!=control capability. Three
      # INDEPENDENT PG16 (A@5432 source, B@5433 receiver, control@5434) + real Redis. THROWS if any URL
      # is unset (no silent skip). Bounded/mechanism-only; does NOT close #10.
      - run: npm run test:control-cutover
        env:
          TSK_TEST_SOURCE_PG_URL_A: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5432/tsk_test
          TSK_TEST_RECEIVER_PG_URL_B: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5433/tsk_test
          TSK_TEST_CONTROL_PG_URL: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5434/tsk_test
          TSK_TEST_REDIS_URL: redis://127.0.0.1:6379
      # (PR2c acceptance) child-process SIGKILL/restart matrix over the FULL control cutover
      # (bind->advance->import->ready->activate): before-commit SIGKILL rolls back (no torn state),
      # after-commit SIGKILL resumes idempotently to ACTIVE. Three INDEPENDENT PG16 + real Redis.
      # Real OS-level process kills. THROWS if any URL is unset. Contributes to closing #10.
      - run: npm run test:sigkill
        env:
          TSK_TEST_SOURCE_PG_URL_A: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5432/tsk_test
          TSK_TEST_RECEIVER_PG_URL_B: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5433/tsk_test
          TSK_TEST_CONTROL_PG_URL: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5434/tsk_test
          TSK_TEST_REDIS_URL: redis://127.0.0.1:6379
      # (PR2c acceptance) GOVERNED B source-authority activation: after ACTIVE, control.activateSource()
      # mints B's unforgeable guard-signed lease at the promoted epoch; B installs it, seeds (N, head@N),
      # and ORIGINATES sequence N+1 through the fenced outbox while the OLD A (revoked, prior epoch) is
      # DENIED. Three INDEPENDENT PG16 + real Redis. Contributes to closing #10.
      - run: npm run test:b-activation
        env:
          TSK_TEST_SOURCE_PG_URL_A: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5432/tsk_test
          TSK_TEST_RECEIVER_PG_URL_B: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5433/tsk_test
          TSK_TEST_CONTROL_PG_URL: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5434/tsk_test
          TSK_TEST_REDIS_URL: redis://127.0.0.1:6379
      # Governed OFFLINE control-schema v1->v2 migration: exact v1 catalog+stamp
      # attestation, signed legacy activation preservation, atomic conversion, and
      # fail-closed rollback on corrupt legacy authority. Real control PG16; no skip.
      - run: npm run test:ha-control-migration
        env:
          TSK_TEST_CONTROL_PG_URL: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5434/tsk_test
      - run: npm run test:ha-control-continuity -w packages/server
      # Enterprise credential authority: every TumblerMapStore mutation commits its
      # authoritative map change and a secret-free signed TSK record in one
      # SERIALIZABLE source-A transaction. Independent B verifies the head chain,
      # revision continuity, fencing, gaps, replays and tampering before staging.
      - run: npm run test:credential-authority
        env:
          TSK_TEST_POSTGRES_URL_A: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5432/tsk_test
          TSK_TEST_POSTGRES_URL_B: postgresql://tsk_test:tsk-test-only-password@127.0.0.1:5433/tsk_test
      # (PR2c acceptance) REAL Redis Sentinel/quorum: 1 master + 2 REPLICAS + 3 sentinels (quorum 2),
      # AOF, min-replicas-to-write. A real master CRASH → automatic promotion; claim() ENFORCES a WAIT
      # replica-quorum ACK so the fence SURVIVES (RPO=0), stays monotonic, RTO measured. run.sh brings up
      # the topology (docker compose) and runs the drill on the host (ioredis natMap over published ports).
      - run: npm run test:sentinel
      # (PR2c acceptance) LIVE split-brain PARTITION: the old master is isolated ALIVE (docker network
      # disconnect); it REFUSES writes (min-replicas-to-write → NOREPLICAS, no split-brain progress) while
      # the surviving quorum promotes a new writable+monotonic master (fence intact, RPO=0); on HEAL the old
      # master is demoted to a replica and reconciles. Per-fault RPO/RTO. Closes the Redis-HA gate for #10.
      - run: npm run test:partition
      - run: npm run test:pack
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: rblake2320/bpc-protocol
          ref: ad6516698f3bb85a3517577f647cf46901205fd1
          path: .compat/bpc-protocol
      - run: npm ci --prefix .compat/bpc-protocol
      - run: npm run build --prefix .compat/bpc-protocol
      - run: npm run test:bpc-compat
        env:
          BPC_PROTOCOL_PATH: ${{ github.workspace }}/.compat/bpc-protocol
      - run: npm audit
